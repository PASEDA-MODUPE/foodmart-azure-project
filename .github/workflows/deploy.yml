name: Build and Deploy FoodMart

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Login to Azure Container Registry
        run: az acr login --name foodmartregistry2026

      - name: Build Docker Image
        run: |
          docker build -t foodmartregistry2026.azurecr.io/foodmart-app:${{ github.sha }} .

      - name: Push Docker Image
        run: |
          docker push foodmartregistry2026.azurecr.io/foodmart-app:${{ github.sha }}

      - name: Update Azure Container App
        run: |
          az containerapp update \
            --name foodmart-app \
            --resource-group foodmart-rg \
            --image foodmartregistry2026.azurecr.io/foodmart-app:${{ github.sha }}